<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coleção Maisto</title>

<script src="libs/tailwind.js"></script>
<script src="libs/react.js"></script>
<script src="libs/react-dom.js"></script>
<script src="libs/babel.js"></script>
<script src="libs/jspdf.js"></script>

  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
      margin: 0;
      background: #f8fafc;
      color: #111827;
    }
   .card:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    }
   .collected-card {
      border: 4px solid #10b981;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useMemo } = React;

  // ===== CONFIG GITHUB =====
  const GIST_ID = "18497a472c5e73107148945c5b000ad7"
  const TOKEN = "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"
  const GIST_FILENAME = "colecao_maisto.json"
  // =========================

  const initialMiniaturesByBrand = {
    Audi: [
      { id: 1, name: "2019 Audi A6", image: "img/audi/2019-audi-a6.jpg" },
      { id: 2, name: "Audi TT Roadster", image: "img/audi/audi-tt-roadster-01.jpg" },
      { id: 3, name: "Audi TT Roadster", image: "img/audi/audi-tt-roadster-02.jpg" },
      { id: 4, name: "Audi TT Roadster", image: "img/audi/audi-tt-roadster-03.jpg" },
      { id: 5, name: "Audi R8 Coupe", image: "img/audi/audi-r8-coupe.jpg" },
      { id: 6, name: "Audi A8 Avant", image: "img/audi/audi-a8-01.jpg" },
      { id: 7, name: "Audi A8 Avant", image: "img/audi/audi-a8-02.jpg" },
    ],
    BMW: [
      { id: 1, name: "BMW Z3", image: "img/bmw/bmw-z3-01.jpg" },
      { id: 2, name: "BMW Z3", image: "img/bmw/bmw-z3-02.jpg" },
      { id: 3, name: "BMW Z3", image: "img/bmw/bmw-z3-03.jpg" },
      { id: 4, name: "BMW 135i Coupe", image: "img/bmw/bmw-135i-coupe-azul.jpg" },
      { id: 5, name: "BMW 1 Series Coupe", image: "img/bmw/bmw-1-coupe-cinza.jpg" },
      { id: 6, name: "BMW 1 Series Coupe", image: "img/bmw/bmw-1-series-coupe-amarelo.jpg" },
      { id: 7, name: "BMW 1 Series Coupe", image: "img/bmw/bmw-1-series-coupe-azul.jpg" },
      { id: 8, name: "BMW 1 Series Coupe", image: "img/bmw/bmw-1-series-coupe-cinza.jpg" },
      { id: 9, name: "BMW X6", image: "img/bmw/bmw-x6.jpg" },
      { id: 10, name: "BMW Z4", image: "img/bmw/bmw-z4.jpg" },
      { id: 11, name: "BMW Z8", image: "img/bmw/bmw-z8.jpg" },
      { id: 12, name: "BMW Z8", image: "img/bmw/bmw-z8-01.jpg" },
      { id: 13, name: "BMW Z8", image: "img/bmw/bmw-z8-02.jpg" },
      { id: 14, name: "BMW Z8", image: "img/bmw/bmw-z8-03.jpg" },
      { id: 15, name: "BMW 328", image: "img/bmw/bmw-328i-2007.jpg" },
      { id: 16, name: "BMW 3 Series M3", image: "img/bmw/bmw-3-series-m3.jpg" },
      { id: 17, name: "BMW 3 Series M3", image: "img/bmw/bmw-3-series-m3-preto.jpg" },
      { id: 18, name: "BMW 6 Series 1", image: "img/bmw/bmw-6-series-1.jpg" },
    ],
  };

  const brandsList = Object.keys(initialMiniaturesByBrand).sort();
  const LOCAL_STORAGE_KEY_COLLECTION = "maistoCollectionData";
  const LOCAL_STORAGE_KEY_LOCKED = "maistoLockedData";

  const getInitialCollection = () => JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_COLLECTION) || "{}");
  const getInitialLockedItems = () => JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_LOCKED) || "{}");

  function App() {
    const [view, setView] = useState('home');
    const [selectedBrand, setSelectedBrand] = useState(null);
    const [miniaturesByBrand] = useState(initialMiniaturesByBrand);
    const [collection, setCollection] = useState(getInitialCollection);
    const [lockedItems, setLockedItems] = useState(getInitialLockedItems);
    const [searchTerm, setSearchTerm] = useState('');
    const [filter, setFilter] = useState('all');
    const [syncStatus, setSyncStatus] = useState('Local');

    // ===== FUNCOES GITHUB DENTRO DO APP =====
    const salvarNaNuvem = async (colecao, locked) => {
      try {
        const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
          method: 'PATCH',
          headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            files: { [GIST_FILENAME]: { content: JSON.stringify({ colecao, locked }, null, 2) } }
          })
        });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        setSyncStatus('Sincronizado ✓');
        setTimeout(() => setSyncStatus('Local'), 3000);
        return true;
      } catch(e) {
        console.error("Erro ao salvar:", e);
        setSyncStatus('Erro 401');
        return false;
      }
    }

    const carregarDaNuvem = async () => {
      const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        headers: { 'Authorization': `Bearer ${TOKEN}` }
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return JSON.parse(data.files[GIST_FILENAME].content);
    }

    const sincronizarAgora = async () => {
      setSyncStatus('Sincronizando...');
      try {
        const dadosNuvem = await carregarDaNuvem();
        const dadosLocal = {
          colecao: JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_COLLECTION) || "{}"),
          locked: JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_LOCKED) || "{}")
        };

        // Junta os dois
        const colecaoJunta = {...dadosLocal.colecao };
        const lockedJunta = {...dadosLocal.locked };
        for(const brand in dadosNuvem.colecao) {
          colecaoJunta[brand] = {...colecaoJunta[brand],...dadosNuvem.colecao[brand] }
        }
        for(const brand in dadosNuvem.locked) {
          lockedJunta[brand] = {...lockedJunta[brand],...dadosNuvem.locked[brand] }
        }

        setCollection(colecaoJunta);
        setLockedItems(lockedJunta);
        localStorage.setItem(LOCAL_STORAGE_KEY_COLLECTION, JSON.stringify(colecaoJunta));
        localStorage.setItem(LOCAL_STORAGE_KEY_LOCKED, JSON.stringify(lockedJunta));

        await salvarNaNuvem(colecaoJunta, lockedJunta);
      } catch(e) {
        console.error("Erro geral sync:", e);
        setSyncStatus('Erro - Veja F12');
      }
    }
    // =========================

    // Carregar da nuvem ao iniciar
    useEffect(() => {
      sincronizarAgora();
    }, []);

    // Salvar local SEMPRE
    useEffect(() => localStorage.setItem(LOCAL_STORAGE_KEY_COLLECTION, JSON.stringify(collection)), [collection]);
    useEffect(() => localStorage.setItem(LOCAL_STORAGE_KEY_LOCKED, JSON.stringify(lockedItems)), [lockedItems]);

    useEffect(() => {
      const handlePopState = () => {
        if (view === 'brand' || view === 'all') {
          setView('home');
          setSelectedBrand(null);
        }
      };
      window.addEventListener('popstate', handlePopState);
      return () => window.removeEventListener('popstate', handlePopState);
    }, [view]);

    const navigate = (newView, brand = null) => {
      history.pushState({ view: newView, brand }, '', `#${newView}${brand? `/${brand}`: ''}`);
      setView(newView);
      setSelectedBrand(brand? { brand } : null);
    };

    const handleGoBack = () => history.back();

    const toggleMiniature = useCallback((brand, id) => {
      setCollection(prev => {
        const updated = {...prev };
        const brandData = {...updated[brand] };
        brandData[id] =!brandData[id];
        if (!brandData[id]) delete brandData[id];
        if (Object.keys(brandData).length === 0) delete updated[brand];
        else updated[brand] = brandData;
        // salva na nuvem 2s depois de clicar
        setTimeout(() => salvarNaNuvem(updated, lockedItems), 2000);
        return updated;
      });
    }, [lockedItems]);

    const totalMiniaturesCount = useMemo(() => Object.values(miniaturesByBrand).reduce((acc, current) => acc + current.length, 0), [miniaturesByBrand]);
    const totalCollectedCount = useMemo(() => Object.values(collection).reduce((acc, brand) => acc + Object.keys(brand).length, 0), [collection]);
    const totalLockedCount = useMemo(() => Object.values(lockedItems).reduce((acc, brand) => acc + Object.keys(brand).length, 0), [lockedItems]);
    const areAllLocked = totalMiniaturesCount > 0 && totalMiniaturesCount === totalLockedCount;

    const toggleLockAllBrands = useCallback(() => {
        setLockedItems(prev => {
            let newLockedItems;
            if (areAllLocked) newLockedItems = {};
            else {
              newLockedItems = {};
              for (const brand in miniaturesByBrand) {
                  const brandLocks = {};
                  miniaturesByBrand[brand].forEach(mini => { brandLocks[mini.id] = true; });
                  newLockedItems[brand] = brandLocks;
              }
            }
            setTimeout(() => salvarNaNuvem(collection, newLockedItems), 2000);
            return newLockedItems;
        });
    }, [miniaturesByBrand, areAllLocked, collection]);

    const allMiniaturesList = useMemo(() => {
        return Object.entries(miniaturesByBrand).flatMap(([brand, minis]) =>
            minis.map(mini => ({...mini, brand }))
        );
    }, [miniaturesByBrand]);

    const filteredMiniatures = useMemo(() => {
        return allMiniaturesList
          .filter(mini => {
                const isCollected = collection[mini.brand]?.[mini.id];
                return filter === 'all' || (filter === 'collected' && isCollected);
            })
          .filter(mini => mini.name.toLowerCase().includes(searchTerm.toLowerCase()));
    }, [allMiniaturesList, collection, filter, searchTerm]);

    const exportToPDF = async () => {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        const pageWidth = doc.internal.pageSize.getWidth();
        const titleHeight = 22;
        doc.text("Relatório da Coleção Maisto", pageWidth / 2, titleHeight, { align: 'center' });
        doc.setFontSize(7);
        doc.setTextColor(100);
        const loadImageAsBase64 = (url) => {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => {
                    const canvas = document.createElement("canvas");
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0);
                    resolve({ dataUrl: canvas.toDataURL("image/jpeg"), width: img.width, height: img.height });
                };
                img.onerror = (e) => { resolve({ dataUrl: null }); };
                img.src = url;
            });
        };
        let y = 30;
        const pageHeight = 280;
        const columns = 5;
        const margin = 5;
        const totalWidth = doc.internal.pageSize.getWidth() - 2 * margin;
        const columnWidth = totalWidth / columns;
        const imageWidth = columnWidth - 2;
        const imageHeight = 12;
        const textSpace = 12;
        const spacing = 10;
        const itemHeight = imageHeight + textSpace + spacing;
        for (let i = 0; i < filteredMiniatures.length; i += columns) {
            if (y + itemHeight > pageHeight - margin) { doc.addPage(); y = margin; }
            for (let j = 0; j < columns; j++) {
                const index = i + j;
                if (index >= filteredMiniatures.length) break;
                const mini = filteredMiniatures[index];
                const x = margin + j * columnWidth + 1;
                try {
                    const imgResult = await loadImageAsBase64(mini.image);
                    if (imgResult && imgResult.dataUrl) {
                        const originalWidth = imgResult.width;
                        const originalHeight = imgResult.height;
                        const calculatedWidth = (originalWidth * imageHeight) / originalHeight;
                        const imageX = (x + (columnWidth / 2)) - (calculatedWidth / 2);
                        doc.addImage(imgResult.dataUrl, 'JPEG', imageX, y, calculatedWidth, imageHeight);
                    } else {
                        doc.setFillColor(230, 230, 230);
                        doc.rect(x, y, imageWidth, imageHeight, 'F');
                        doc.setTextColor(150);
                        doc.text("No Img", x + imageWidth / 2, y + imageHeight / 2, { align: 'center', baseline: 'middle' });
                        doc.setTextColor(100);
                    }
                } catch (error) {
                    doc.setFillColor(230, 230, 230);
                    doc.rect(x, y, imageWidth, imageHeight, 'F');
                    doc.setTextColor(150);
                    doc.text("Erro IMG", x + imageWidth / 2, y + imageHeight / 2, { align: 'center', baseline: 'middle' });
                    doc.setTextColor(100);
                }
                const status = collection[mini.brand]?.[mini.id]? "Tenho: SIM" : "Tenho: NAO";
                const line1 = mini.name;
                const textLines = doc.splitTextToSize(line1, imageWidth);
                const textY = y + imageHeight + 4;
                doc.text(textLines, x, textY);
                doc.text(status, x, textY + (textLines.length * 3.2));
            }
            y += itemHeight;
        }
        doc.save("colecao_maisto.pdf");
    };

    const BackgroundWrapper = ({ children }) => (
      <div className="min-h-screen bg-cover bg-center flex-col items-center justify-start text-white p-4"
        style={{ backgroundImage: "url('img/alemed.jpg')", backgroundAttachment: "fixed" }}>
        <div className="relative bg-black/70 w-full h-full flex-col items-center justify-start p-6 rounded-xl max-w-6xl mx-auto shadow-2xl min-h-[90vh] md:min-h-[95vh]">
          {children}
        </div>
      </div>
    );

    if (view === 'all') {
      return (
        <BackgroundWrapper>
          <div className="w-full flex justify-between items-center mb-4">
            <button onClick={handleGoBack} className="flex items-center gap-2 px-4 py-2 text-sm bg-purple-600 text-white font-semibold rounded-lg shadow-lg hover:bg-purple-700 active:scale-95 transition">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
              Voltar
            </button>
            <h1 className="text-3xl font-extrabold text-purple-400">Todas as Miniaturas</h1>
            <div className="flex gap-2">
              <span className="text-xs px-2 py-1 bg-black/50 rounded">{syncStatus}</span>
              <button onClick={sincronizarAgora} className="text-xs px-2 py-1 bg-blue-600 rounded">Sync</button>
            </div>
          </div>

          <div className="w-full flex-col md:flex-row gap-4 mb-6">
            <input type="text" placeholder="Buscar por nome..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="flex-grow p-2 rounded-lg bg-white/20 border-purple-400/50 focus:ring-purple-500 focus:border-purple-500"/>
            <div className="flex gap-2">
              <button onClick={() => setFilter('all')} className={`px-4 py-2 rounded-lg font-semibold ${filter === 'all'? 'bg-purple-600' : 'bg-white/10'}`}>Todas</button>
              <button onClick={() => setFilter('collected')} className={`px-4 py-2 rounded-lg font-semibold ${filter === 'collected'? 'bg-purple-600' : 'bg-white/10'}`}>Minha Coleção</button>
            </div>
            <button onClick={exportToPDF} className="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg font-semibold">Exportar para PDF</button>
          </div>

          <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 w-full">
            {filteredMiniatures.map(mini => {
              const isCollected = collection[mini.brand]?.[mini.id];
              const isLocked = lockedItems[mini.brand]?.[mini.id];
              return (
                <div key={`${mini.brand}-${mini.id}`} className={"bg-white shadow-xl rounded-xl p-3 flex-col items-center justify-between " + (isCollected? "collected-card" : "border border-gray-200")}>
                  <div className="w-full h-[120px] bg-gray-200 rounded-lg mb-2 flex items-center justify-center overflow-hidden">
                    <img src={mini.image} alt={mini.name} className="object-contain w-full h-full rounded-lg" onError={e => e.target.src = 'https://placehold.co/225x120/f3f4f6/333?text=ERRO+IMG'} />
                  </div>
                  <p className="text-gray-800 text-xs sm:text-sm font-semibold text-center mt-1 mb-2">{mini.name}</p>
                  <p className="text-gray-500 text-xs font-medium mb-2">{mini.brand}</p>
                  <label onClick={!isLocked? () => toggleMiniature(mini.brand, mini.id) : undefined} className={"flex w-full justify-center gap-2 text-gray-800 text-sm font-medium p-2 rounded-lg " + (isLocked? "bg-gray-200 cursor-not-allowed opacity-70" : "bg-gray-100 hover:bg-gray-200 cursor-pointer")}>
                    <input type="checkbox" checked={!!isCollected} disabled={isLocked} readOnly className="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500" /> Tenho
                  </label>
                </div>
              );
            })}
          </div>
        </BackgroundWrapper>
      );
    }

    if (view === 'brand') {
      const { brand } = selectedBrand;
      const miniatures = miniaturesByBrand[brand] || [];
      const currentCollection = collection[brand] || {};
      const currentLocked = lockedItems[brand] || {};
      return (
        <BackgroundWrapper>
          <div className="w-full flex justify-between items-center mb-6">
            <button onClick={handleGoBack} className="flex items-center gap-2 px-4 py-2 text-sm bg-purple-600 text-white font-semibold rounded-lg shadow-lg hover:bg-purple-700 active:scale-95 transition">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
              Voltar
            </button>
            <div className="flex gap-2">
              <span className="text-xs px-2 py-1 bg-black/50 rounded">{syncStatus}</span>
              <button onClick={sincronizarAgora} className="text-xs px-2 py-1 bg-blue-600 rounded">Sync</button>
            </div>
            <button onClick={toggleLockAllBrands} className={(areAllLocked? "bg-red-600 hover:bg-red-700" : "bg-gray-200 text-gray-800 hover:bg-gray-300") + " px-4 py-2 text-sm font-semibold rounded-lg shadow-lg transition"}>
              {areAllLocked? 'Desbloquear Tudo' : 'Bloquear Tudo'}
            </button>
          </div>
          <h2 className="text-4xl font-extrabold text-purple-400 mb-6 text-center">Coleção Maisto - {brand}</h2>
          <div className="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 w-full">
            {miniatures.map((mini) => {
              const isCollected = currentCollection[mini.id];
              const isLocked = currentLocked[mini.id];
              return (
                <div key={mini.id} className={"bg-white shadow-xl rounded-xl p-3 flex-col items-center justify-between " + (isCollected? "collected-card" : "border border-gray-200")}>
                  <div className="w-full h-[120px] bg-gray-200 rounded-lg mb-2 flex items-center justify-center overflow-hidden">
                    <img src={mini.image} alt={mini.name} className="object-contain w-full h-full rounded-lg" onError={e => e.target.src = 'https://placehold.co/225x120/f3f4f6/333?text=ERRO+IMG'} />
                  </div>
                  <p className="text-gray-800 text-xs sm:text-sm font-semibold text-center mt-1 mb-2">{mini.name}</p>
                  <label onClick={!isLocked? () => toggleMiniature(brand, mini.id) : undefined} className={"flex w-full justify-center gap-2 text-gray-800 text-sm font-medium p-2 rounded-lg " + (isLocked? "bg-gray-200 cursor-not-allowed opacity-70" : "bg-gray-100 hover:bg-gray-200 cursor-pointer")}>
                    <input type="checkbox" checked={!!isCollected} disabled={isLocked} readOnly className="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500" /> Tenho
                  </label>
                </div>
              );
            })}
          </div>
        </BackgroundWrapper>
      );
    }

    return (
      <BackgroundWrapper>
        <div className="w-full relative text-center mb-4">
          <h1 className="text-5xl font-extrabold text-purple-300">Coleção Maisto</h1>
          <div className="text-right w-full md:w-auto mt-4 md:mt-0">
            <h2 className="font-bold text-lg text-purple-300">Minha Coleção</h2>
            <p className="text-2xl font-mono">{totalCollectedCount} / {totalMiniaturesCount}</p>
          </div>
        </div>
        <p className="text-2xl text-center text-gray-400">Selecione a marca para visualizar sua coleção.</p>
        <div className="w-full h-0 mb-8 max-w-5xl"></div>
        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 w-full max-w-5xl">
          {brandsList.map((brand) => {
            const totalInBrand = miniaturesByBrand[brand]?.length || 0;
            const collectedInBrand = Object.keys(collection[brand] || {}).length;
            return (
              <div key={brand} onClick={() => navigate('brand', brand)} className="bg-white/10 shadow-lg rounded-xl p-3 flex flex-col items-center justify-center border border-purple-500/50 card cursor-pointer">
                <h3 className="text-xl font-bold text-purple-300 text-center">{brand}</h3>
                <p className="text-sm font-medium text-gray-300 mt-2">{collectedInBrand} / {totalInBrand}</p>
              </div>
            )
          })}
        </div>
        <div className="w-full h-0 mb-8 max-w-5xl"></div>
        <div className="absolute bottom-6 right-6 flex gap-2">
            <button onClick={sincronizarAgora} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold shadow-lg">
                Sincronizar
            </button>
            <button onClick={() => navigate('all')} className="px-6 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold shadow-lg">
                Ver Todas
            </button>
        </div>
      </BackgroundWrapper>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
